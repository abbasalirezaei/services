<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Test Page</title>
    <style>
        /* Simple styling to make it look nice */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 {
            color: #2c3e50;
        }
        .success-box {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #28a745;
        }
        .emoji-big {
            font-size: 48px;
        }
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <p class="emoji-big">🚀</p>
        <h1>It's Working Abbas!</h1>
        <p>Your GitHub Pages site is successfully deployed.</p>
        <p>This is a test page for:</p>
        <code style="background: #eee; padding: 4px 8px; border-radius: 4px;">
            https://abbasalirezaei.github.io/your-repo-name
        </code>
        <p style="margin-top: 20px;">🎉 You can now replace this file with your own website content.</p>
    </div>
    <div class="footer">
        Created with ❤️ using GitHub Pages
    </div>
</body>
</html>
